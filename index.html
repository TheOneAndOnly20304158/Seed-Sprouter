<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seed Sprouter Pro - Persistent Farm</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            transition: background 2s;
        }
        body.raining { background: linear-gradient(to bottom, #4682B4, #708090); }
        body.golden { background: linear-gradient(to bottom, #FFD700, #FF8C00); }
        
        #game {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
        }
        .header { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .stat-card { background: #fff9c4; padding: 10px 20px; border-radius: 10px; border: 2px solid #fbc02d; font-size: 1.2em; }
        
        .nav-bar { grid-column: span 3; margin-bottom: 10px; }
        .nav-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .nav-btn:hover { background: #388e3c; transform: scale(1.05); }

        .column { display: flex; flex-direction: column; gap: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; border: 2px solid #ccc; text-align: left; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 5px 0; border-bottom: 1px solid #eee; }
        
        #garden-view { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; background: #795548; padding: 20px; border-radius: 15px; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .plot { background: #8d6e63; aspect-ratio: 1/1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; border: 2px solid #6d4c41; transition: 0.1s; position: relative; overflow: hidden; }
        .plot.ready { background: #4caf50 !important; animation: pulse 1.5s infinite; border-color: #2e7d32; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #farm-view { background: #c5e1a5; border-radius: 15px; border: 5px solid #558b2f; min-height: 400px; position: relative; display: none; overflow: hidden; }
        .chicken { position: absolute; font-size: 40px; transition: all 1.5s ease; cursor: default; user-select: none; z-index: 5; }
        .egg-btn { background: #fffde7; border: 2px solid #fbc02d; width: 100%; padding: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 5px; }

        .seed-btn { background: #fff; border: 2px solid #4CAF50; border-radius: 5px; cursor: pointer; padding: 6px 10px; font-weight: bold; font-size: 13px; }
        .sell-btn { background: #ff9800; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .timer-text { color: #d32f2f; font-weight: bold; font-size: 14px; margin-bottom: 10px; text-align: center; background: #ffebee; border-radius: 5px; padding: 5px; }
        textarea { width: 100%; font-size: 10px; height: 40px; margin-top: 5px; resize: none; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <h1>🌻 Seed Sprouter Pro 🌻</h1>
        <div class="stat-card"><strong>Munz: 💰<span id="munz">100</span></strong></div>
    </div>

    <div class="nav-bar">
        <button id="btn-to-farm" class="nav-btn" onclick="switchView('farm')">🚜 Go to Farm</button>
        <button id="btn-to-garden" class="nav-btn" style="display:none;" onclick="switchView('garden')">🏡 Back to Garden</button>
    </div>

    <div class="column">
        <div class="box" id="weather-box">
            <div id="golden-status"></div>
            Weather: <span id="weather-status">☀️ Sunny</span><br>
            <small id="weather-timer">Next change in: --:--</small>
        </div>
        
        <div class="box">
            <h3 style="margin:0">Global Shop</h3>
            <div class="timer-text">Restock in: <span id="restock-timer">--</span>s</div>
            <div id="shop-list"></div>
        </div>

        <div class="box" style="background: #e8f5e9;">
            <h3 style="margin:0 0 10px 0">🎒 Seed Bag</h3>
            <div id="inventory-list"></div>
            <hr><small>Holding: <strong id="selected-txt">None</strong></small>
        </div>
    </div>

    <div id="garden-view"></div>
    <div id="farm-view">
        <h2 style="color:#33691e; margin:0; padding-top:10px;">Chicken Pasture</h2>
        <div id="pasture" style="height:300px; position:relative;"></div>
        <div style="padding: 15px; background: rgba(255,255,255,0.5);">
            <strong>Eggs in Nest: 🥚 <span id="egg-count">0</span></strong>
            <button class="egg-btn" onclick="collectEggs()">🧺 Collect Eggs</button>
        </div>
    </div>

    <div class="column">
        <div class="box" style="background: #fff3e0; border-color: #ff9800;">
            <h3 style="margin:0 0 10px 0">🧺 The Barn</h3>
            <div id="barn-list"></div>
            <button class="sell-btn" style="width:100%; margin-top:10px;" id="sell-all-btn" onclick="sellAll()">Sell All Items</button>
        </div>

        <div class="box">
            <h3 style="margin:0 0 5px 0">Save/Load</h3>
            <textarea id="saveCode" placeholder="Paste code here..."></textarea>
            <button class="seed-btn" style="width:100%; margin-top:5px; background:#2196F3; color:white; border:none;" onclick="exportSave()">Export Data</button>
            <button class="seed-btn" style="width:100%; margin-top:5px; background:#f44336; color:white; border:none;" onclick="importSave()">Import Data</button>
        </div>

        <div class="box">
            <iframe src="https://www3.cbox.ws/box/?boxid=3553708&boxtag=vUIUmT" width="100%" height="200" frameborder="0"></iframe>
        </div>
    </div>
</div>

<script>
    const SAVE_KEY = 'sprouter_pro_global_save';
    
    let state = {
        munz: 100, 
        selectedSeed: null,
        inventory: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        barn: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0, Egg: 0 },
        plots: Array(25).fill(null),
        chickens: 0,
        eggsInNest: 0,
        lastEggTime: Date.now(),
        currentShopID: "", 
        view: 'garden'
    };

    const cropData = {
        Basil:     { symbol: "🌿", price: 10,  time: 15000,  sell: 15 },
        Wheat:     { symbol: "🌾", price: 75,  time: 30000,  sell: 100 },
        Carrot:    { symbol: "🥕", price: 50,  time: 45000,  sell: 75 },
        Tomato:    { symbol: "🍅", price: 100, time: 60000, sell: 125 },
        Sunflower: { symbol: "🌻", price: 200, time: 120000, sell: 500 },
        Egg:       { symbol: "🥚", price: 0,   time: 20000,  sell: 25 }
    };

    function switchView(v) {
        state.view = v;
        document.getElementById('garden-view').style.display = v === 'garden' ? 'grid' : 'none';
        document.getElementById('farm-view').style.display = v === 'farm' ? 'block' : 'none';
        document.getElementById('btn-to-farm').style.display = v === 'garden' ? 'inline-block' : 'none';
        document.getElementById('btn-to-garden').style.display = v === 'farm' ? 'inline-block' : 'none';
        renderShop();
    }

    function buyChicken() {
        if (state.munz >= 500) {
            state.munz -= 500;
            state.chickens++;
            createChickenSprite();
            refreshUI(); saveGame();
        }
    }

    function createChickenSprite() {
        const p = document.getElementById('pasture');
        const c = document.createElement('div');
        c.className = 'chicken';
        c.innerHTML = '🐓';
        c.style.left = Math.random() * 80 + '%';
        c.style.top = Math.random() * 80 + '%';
        p.appendChild(c);
        setInterval(() => {
            c.style.left = Math.random() * 80 + '%';
            c.style.top = Math.random() * 80 + '%';
        }, 3000);
    }

    function collectEggs() {
        state.barn.Egg += state.eggsInNest;
        state.eggsInNest = 0;
        refreshUI(); saveGame();
    }

    function renderShop() {
        const sEl = document.getElementById('shop-list');
        sEl.innerHTML = '';
        if (state.view === 'farm') {
            sEl.innerHTML = `<div class="item-row">
                <div><strong>🐓 Chicken</strong><br><small>Lays eggs every 20s</small></div>
                <button class="seed-btn" onclick="buyChicken()">💰500</button>
            </div>`;
        } else {
            for (let k in state.inventory) {
                sEl.innerHTML += `<div class="item-row">
                    <div><strong>${cropData[k].symbol} ${k}</strong></div>
                    <button class="seed-btn" onclick="buySeed('${k}')">💰${cropData[k].price}</button>
                </div>`;
            }
        }
    }

    function buySeed(t) {
        if (state.munz >= cropData[t].price) {
            state.munz -= cropData[t].price;
            state.inventory[t]++;
            refreshUI(); saveGame();
        }
    }

    function handlePlot(i) {
        const p = state.plots[i];
        if (p && p.progress >= 100) {
            const key = Object.keys(cropData).find(k => cropData[k].symbol === p.symbol);
            state.barn[key]++; 
            state.plots[i] = null;
        } else if (!p && state.selectedSeed && state.inventory[state.selectedSeed] > 0) {
            state.inventory[state.selectedSeed]--;
            state.plots[i] = { ...cropData[state.selectedSeed], progress: 0 };
        }
        refreshUI(); saveGame();
    }

    function refreshUI() {
        document.getElementById('munz').textContent = Math.floor(state.munz);
        document.getElementById('egg-count').textContent = state.eggsInNest;
        document.getElementById('selected-txt').textContent = state.selectedSeed || "None";
        
        const invEl = document.getElementById('inventory-list'); invEl.innerHTML = '';
        for (let k in state.inventory) if (state.inventory[k] > 0) {
            invEl.innerHTML += `<div class="item-row"><span>${cropData[k].symbol} x${state.inventory[k]}</span><button class="seed-btn ${state.selectedSeed===k?'active':''}" onclick="state.selectedSeed='${k}';refreshUI()">Hold</button></div>`;
        }

        const barnEl = document.getElementById('barn-list'); barnEl.innerHTML = '';
        const isGolden = new Date().getMinutes() >= 50;
        for (let k in state.barn) if (state.barn[k] > 0) {
            const price = isGolden ? cropData[k].sell * 2 : cropData[k].sell;
            barnEl.innerHTML += `<div class="item-row"><span>${cropData[k].symbol} x${state.barn[k]}</span><button class="sell-btn" onclick="sellItem('${k}')">💰${price}</button></div>`;
        }

        state.plots.forEach((p, i) => {
            const el = document.getElementById(`p-${i}`);
            if (!p) { el.textContent = ''; el.className = 'plot'; el.style.background = "#8d6e63"; } 
            else {
                if (p.progress >= 100) { el.textContent = p.symbol; el.className = 'plot ready'; }
                else { el.textContent = '🌱'; el.className = 'plot'; el.style.background = `linear-gradient(to top, #4CAF50 ${p.progress}%, #8d6e63 ${p.progress}%)`; }
            }
        });
    }

    function sellItem(t) {
        const isGolden = new Date().getMinutes() >= 50;
        if (state.barn[t] > 0) {
            state.munz += (isGolden ? cropData[t].sell * 2 : cropData[t].sell);
            state.barn[t]--; refreshUI(); saveGame();
        }
    }

    function sellAll() {
        const isGolden = new Date().getMinutes() >= 50;
        for (let k in state.barn) {
            state.munz += (state.barn[k] * (isGolden ? cropData[k].sell * 2 : cropData[k].sell));
            state.barn[k] = 0;
        }
        refreshUI(); saveGame();
    }

    function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            state = Object.assign(state, JSON.parse(saved));
            const pasture = document.getElementById('pasture');
            pasture.innerHTML = ''; // Clear existing
            for(let i=0; i<state.chickens; i++) createChickenSprite();
        }
    }

    function exportSave() { 
        const code = btoa(JSON.stringify(state));
        document.getElementById('saveCode').value = code;
        alert("Code copied to box! Copy it somewhere safe.");
    }

    function importSave() {
        try {
            const code = document.getElementById('saveCode').value;
            const data = JSON.parse(atob(code));
            state = data;
            saveGame();
            location.reload();
        } catch(e) { alert("Invalid save code!"); }
    }

    function init() {
        loadGame();
        const grid = document.getElementById('garden-view');
        for(let i=0; i<25; i++) {
            const el = document.createElement('div'); el.className = 'plot'; el.id = `p-${i}`; el.onclick = () => handlePlot(i);
            grid.appendChild(el);
        }
        
        setInterval(() => { 
            const now = new Date();
            const min = now.getMinutes();
            const isRaining = min % 10 < 3;
            const isGolden = min >= 50;

            document.body.className = isGolden ? 'golden' : (isRaining ? 'raining' : '');
            document.getElementById('weather-status').textContent = isRaining ? "🌧️ Raining" : "☀️ Sunny";
            document.getElementById('golden-status').innerHTML = isGolden ? "✨ GOLDEN HOUR ✨" : "";
            document.getElementById('restock-timer').textContent = 59 - now.getSeconds();

            state.plots.forEach(p => { if(p && p.progress < 100) p.progress += ((isRaining?3:1) / (p.time/1000)) * 100; });
            
            if (state.chickens > 0 && Date.now() - state.lastEggTime >= 20000) {
                state.eggsInNest += state.chickens;
                state.lastEggTime = Date.now();
                saveGame();
            }
            refreshUI(); 
        }, 1000);
        renderShop();
        refreshUI();
    }
    init();
</script>
</body>
</html>
