<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seed Sprouter Pro - Definitive Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            transition: background 2s;
        }
        body.raining { background: linear-gradient(to bottom, #4682B4, #708090); }
        body.golden { background: linear-gradient(to bottom, #FFD700, #FF8C00); }
        
        #game {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
        }
        .header { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .stat-card { background: #fff9c4; padding: 10px 20px; border-radius: 10px; border: 2px solid #fbc02d; font-size: 1.2em; }
        
        .nav-bar { grid-column: span 3; margin-bottom: 10px; display: flex; gap: 10px; justify-content: center; }
        .nav-btn { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; }
        .nav-btn:hover { background: #388e3c; }

        .column { display: flex; flex-direction: column; gap: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; border: 2px solid #ccc; text-align: left; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 5px 0; border-bottom: 1px solid #eee; }
        
        #profile-box { background: #f3e5f5; border: 2px solid #9c27b0; }
        .rank-tag { background: #9c27b0; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }

        #garden-view { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; background: #795548; padding: 20px; border-radius: 15px; box-shadow: inset 0 0 15px rgba(0,0,0,0.4); }
        .plot { background: #8d6e63; aspect-ratio: 1/1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; border: 2px solid #6d4c41; position: relative; overflow: hidden; }
        .plot.ready { background: #4caf50 !important; animation: pulse 1.5s infinite; border-color: #2e7d32; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        #farm-view { background: #c5e1a5; border-radius: 15px; border: 5px solid #558b2f; min-height: 400px; position: relative; display: none; overflow: hidden; }
        .chicken { position: absolute; font-size: 40px; transition: all 1.5s ease; user-select: none; z-index: 2; }

        .seed-btn { background: #fff; border: 2px solid #4CAF50; border-radius: 5px; cursor: pointer; padding: 6px 10px; font-weight: bold; }
        .seed-btn.active { background: #4CAF50; color: white; }
        .sell-btn { background: #ff9800; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .wipe-btn { background: #f44336; color: white; border: none; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: bold; width: 100%; margin-top: 5px;}
        .timer-text { color: #d32f2f; font-weight: bold; font-size: 14px; text-align: center; background: #ffebee; border-radius: 5px; padding: 5px; margin-bottom: 5px;}
        textarea { width: 100%; font-size: 10px; height: 50px; margin-top: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <h1>🌻 Seed Sprouter Pro 🌻</h1>
        <div class="stat-card"><strong>Munz: 💰<span id="munz">100</span></strong></div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="switchView('garden')">🏡 Garden</button>
        <button class="nav-btn" onclick="switchView('farm')">🚜 Farm</button>
    </div>

    <div class="column">
        <div class="box" id="profile-box">
            <h3 style="margin:0">👩‍🌾 Profile</h3>
            <div style="margin-top:5px;">Rank: <span class="rank-tag" id="farmer-rank">Newbie Farmer</span></div>
            <div style="font-size: 0.85em; margin-top:5px;">Lifetime: 💰<span id="lifetime-munz">0</span></div>
        </div>

        <div class="box" style="background: #e1f5fe; border-color: #03a9f4;">
            <div id="golden-status" style="font-weight:bold; color: #d84315;"></div>
            <strong>Weather:</strong> <span id="weather-status">☀️ Sunny</span><br>
            <strong>Timer:</strong> <span id="weather-timer" style="color: #0277bd; font-weight: bold;">--:--</span>
        </div>
        
        <div class="box">
            <h3 style="margin:0">Global Shop</h3>
            <div class="timer-text">Restock in: <span id="restock-timer">--</span>s</div>
            <div id="shop-list"></div>
        </div>
    </div>

    <div id="garden-view"></div>
    <div id="farm-view">
        <h2 style="color:#33691e; margin:10px 0;">Chicken Pasture</h2>
        <div id="pasture" style="height:280px; position:relative;"></div>
        <div style="padding: 10px; background: rgba(255,255,255,0.8); border-top: 2px solid #558b2f;">
            <strong>Nest:</strong> 🥚 <span id="egg-count">0</span> | ✨ <span id="gegg-count">0</span>
            <button class="seed-btn" style="margin-left:10px;" onclick="collectEggs()">🧺 Collect</button>
        </div>
    </div>

    <div class="column">
        <div class="box" style="background: #e8f5e9;">
            <h3 style="margin:0 0 10px 0">🎒 Seeds</h3>
            <div id="inventory-list"></div>
            <small>Selected: <strong id="selected-txt">None</strong></small>
        </div>

        <div class="box" style="background: #fff3e0; border-color: #ff9800;">
            <h3 style="margin:0 0 10px 0">🧺 The Barn</h3>
            <div id="barn-list"></div>
            <button class="sell-btn" style="width:100%; margin-top:10px;" onclick="sellAll()">Sell Everything</button>
        </div>

        <div class="box">
            <h3 style="margin:0 0 5px 0">Global Chat</h3>
            <iframe src="https://www3.cbox.ws/box/?boxid=3553735&boxtag=JMxaQu" width="100%" height="300" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>
        </div>

        <div class="box">
            <h4 style="margin:0">Sync & Data</h4>
            <textarea id="saveCode" placeholder="Backup code..."></textarea>
            <div style="display:flex; gap:5px;">
                <button class="seed-btn" style="flex:1; font-size:10px;" onclick="exportSave()">Export</button>
                <button class="seed-btn" style="flex:1; font-size:10px;" onclick="importSave()">Import</button>
            </div>
            <button class="wipe-btn" onclick="wipeSave()">🗑️ DELETE ALL DATA</button>
        </div>
    </div>
</div>

<script>
    const SAVE_KEY = 'sprouter_pro_final_v1';
    let state = {
        munz: 100, lifetimeMunz: 0, selectedSeed: null,
        inventory: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        barn: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0, Egg: 0, GoldEgg: 0 },
        plots: Array(25).fill(null),
        chickens: 0, eggsInNest: 0, gEggsInNest: 0, lastEggTime: Date.now(),
        shopStock: {}, currentShopID: "", view: 'garden'
    };

    const cropData = {
        Basil:     { symbol: "🌿", price: 10,  time: 15,  sell: 15,  chance: 1.0,  max: 20 },
        Wheat:     { symbol: "🌾", price: 75,  time: 30,  sell: 100, chance: 0.7,  max: 15 },
        Carrot:    { symbol: "🥕", price: 50,  time: 45,  sell: 75,  chance: 0.8,  max: 12 },
        Tomato:    { symbol: "🍅", price: 100, time: 60,  sell: 125, chance: 0.4,  max: 8 },
        Sunflower: { symbol: "🌻", price: 200, time: 120, sell: 500, chance: 0.15, max: 4 }
    };

    function seededRandom(seed) {
        let x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    function updateRank() {
        let rank = "Newbie Farmer";
        const m = state.lifetimeMunz;
        if (m > 10000000) rank = "Transcendental Farmer";
        else if (m > 2000000) rank = "Mythical Farmer";
        else if (m > 500000) rank = "Legendary Farmer";
        else if (m > 150000) rank = "Grandmaster Farmer";
        else if (m > 50000) rank = "Master Farmer";
        else if (m > 15000) rank = "Expert Farmer";
        else if (m > 5000) rank = "Advanced Farmer";
        else if (m > 2000) rank = "Intermediate Farmer";
        document.getElementById('farmer-rank').textContent = rank;
    }

    function updateGlobalLogic() {
        const now = new Date();
        const min = now.getMinutes();
        const sec = now.getSeconds();

        const isRaining = (min % 10 < 3);
        const isGolden = (min >= 50);
        
        document.body.className = isGolden ? 'golden' : (isRaining ? 'raining' : '');
        document.getElementById('weather-status').textContent = isRaining ? "🌧️ Raining" : (isGolden ? "✨ Golden Hour" : "☀️ Sunny");
        document.getElementById('golden-status').textContent = isGolden ? "2X SELL ACTIVE" : "";
        
        let timeRemaining;
        if (isRaining) timeRemaining = `${2-(min%10)}m ${59-sec}s until Sun`;
        else if (min < 50) timeRemaining = `${49-min}m ${59-sec}s until Golden`;
        else timeRemaining = `${59-min}m ${59-sec}s until Reset`;
        document.getElementById('weather-timer').textContent = timeRemaining;

        document.getElementById('restock-timer').textContent = 59 - sec;

        const shopID = `${now.getHours()}-${min}`;
        if (state.currentShopID !== shopID) {
            state.currentShopID = shopID;
            state.shopStock = {};
            let seedBase = now.getFullYear() + now.getHours() + min;
            Object.keys(cropData).forEach((k, i) => {
                if (seededRandom(seedBase + i) < cropData[k].chance) {
                    state.shopStock[k] = Math.floor(seededRandom(seedBase + i + 5) * cropData[k].max) + 1;
                }
            });
            renderShop();
        }

        if (state.chickens > 0 && Date.now() - state.lastEggTime >= 20000) {
            for(let i=0; i<state.chickens; i++) {
                if(Math.random() < 0.02) state.gEggsInNest++; else state.eggsInNest++;
            }
            state.lastEggTime = Date.now();
        }

        state.plots.forEach(p => { if (p && p.progress < 100) p.progress = Math.min(100, p.progress + ((isRaining?3:1)/p.time)*100); });
        refreshUI();
    }

    function renderShop() {
        const sEl = document.getElementById('shop-list'); sEl.innerHTML = '';
        if (state.view === 'farm') {
            sEl.innerHTML = `<div class="item-row"><div><strong>🐓 Chicken</strong><br><small>Cost: 💰500</small></div><button class="seed-btn" onclick="buyChicken()">Buy</button></div>`;
        } else {
            Object.keys(state.shopStock).forEach(k => {
                sEl.innerHTML += `<div class="item-row"><div><strong>${cropData[k].symbol} ${k}</strong><br><small>Stock: ${state.shopStock[k]}</small></div><button class="seed-btn" onclick="buySeed('${k}')" ${state.shopStock[k]<=0?'disabled':''}>💰${cropData[k].price}</button></div>`;
            });
        }
    }

    function buySeed(t) { if (state.munz >= cropData[t].price && state.shopStock[t] > 0) { state.munz -= cropData[t].price; state.inventory[t]++; state.shopStock[t]--; renderShop(); saveGame(); } }
    function buyChicken() { if (state.munz >= 500) { state.munz -= 500; state.chickens++; createChickenSprite(); saveGame(); } }

    function handlePlot(i) {
        const p = state.plots[i];
        if (p && p.progress >= 100) {
            const key = Object.keys(cropData).find(k => cropData[k].symbol === p.symbol);
            state.barn[key]++; state.plots[i] = null;
        } else if (!p && state.selectedSeed && state.inventory[state.selectedSeed] > 0) {
            state.inventory[state.selectedSeed]--;
            state.plots[i] = { ...cropData[state.selectedSeed], progress: 0 };
        }
        saveGame();
    }

    function refreshUI() {
        document.getElementById('munz').textContent = Math.floor(state.munz);
        document.getElementById('lifetime-munz').textContent = Math.floor(state.lifetimeMunz);
        document.getElementById('egg-count').textContent = state.eggsInNest;
        document.getElementById('gegg-count').textContent = state.gEggsInNest;
        document.getElementById('selected-txt').textContent = state.selectedSeed || "None";
        updateRank();

        const invEl = document.getElementById('inventory-list'); invEl.innerHTML = '';
        for (let k in state.inventory) if (state.inventory[k] > 0) {
            invEl.innerHTML += `<div class="item-row"><span>${cropData[k].symbol} x${state.inventory[k]}</span><button class="seed-btn ${state.selectedSeed===k?'active':''}" onclick="state.selectedSeed='${k}';refreshUI()">Hold</button></div>`;
        }

        const barnEl = document.getElementById('barn-list'); barnEl.innerHTML = '';
        const isGolden = new Date().getMinutes() >= 50;
        for (let k in state.barn) if (state.barn[k] > 0) {
            let val = (k==='Egg')?25:(k==='GoldEgg')?250:cropData[k].sell;
            let price = isGolden ? val * 2 : val;
            barnEl.innerHTML += `<div class="item-row"><span>${(k==='Egg'?'🥚':k==='GoldEgg'?'✨':cropData[k].symbol)} x${state.barn[k]}</span><button class="sell-btn" onclick="sellItem('${k}')">💰${price}</button></div>`;
        }

        state.plots.forEach((p, i) => {
            const el = document.getElementById(`p-${i}`);
            if (!p) { el.textContent = ''; el.className = 'plot'; el.style.background = "#8d6e63"; } 
            else {
                if (p.progress >= 100) { el.textContent = p.symbol; el.className = 'plot ready'; }
                else { el.textContent = '🌱'; el.style.background = `linear-gradient(to top, #4CAF50 ${p.progress}%, #8d6e63 ${p.progress}%)`; }
            }
        });
    }

    function sellItem(t) {
        const isGolden = new Date().getMinutes() >= 50;
        let val = (t==='Egg')?25:(t==='GoldEgg')?250:cropData[t].sell;
        let final = isGolden ? val * 2 : val;
        state.munz += final; state.lifetimeMunz += final;
        state.barn[t]--; saveGame();
    }

    function sellAll() {
        const isGolden = new Date().getMinutes() >= 50;
        for (let k in state.barn) {
            let val = (k==='Egg')?25:(k==='GoldEgg')?250:cropData[k].sell;
            let final = (isGolden ? val * 2 : val) * state.barn[k];
            state.munz += final; state.lifetimeMunz += final;
            state.barn[k] = 0;
        }
        saveGame();
    }

    function switchView(v) {
        state.view = v;
        document.getElementById('garden-view').style.display = v === 'garden' ? 'grid' : 'none';
        document.getElementById('farm-view').style.display = v === 'farm' ? 'block' : 'none';
        renderShop();
    }

    function createChickenSprite() {
        const c = document.createElement('div'); c.className = 'chicken'; c.innerHTML = '🐓';
        c.style.left = Math.random() * 80 + '%'; c.style.top = Math.random() * 70 + '%';
        document.getElementById('pasture').appendChild(c);
        setInterval(() => { c.style.left = Math.random() * 80 + '%'; c.style.top = Math.random() * 70 + '%'; }, 3000);
    }

    function collectEggs() { state.barn.Egg += state.eggsInNest; state.barn.GoldEgg += state.gEggsInNest; state.eggsInNest = 0; state.gEggsInNest = 0; saveGame(); }
    function saveGame() { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }
    function loadGame() {
        const s = localStorage.getItem(SAVE_KEY);
        if (s) { state = Object.assign(state, JSON.parse(s)); for(let i=0; i<state.chickens; i++) createChickenSprite(); }
    }
    function wipeSave() { if(confirm("This will permanently delete ALL progress. Are you sure?")) { localStorage.removeItem(SAVE_KEY); location.reload(); } }
    function exportSave() { document.getElementById('saveCode').value = btoa(JSON.stringify(state)); }
    function importSave() { try { state = JSON.parse(atob(document.getElementById('saveCode').value)); saveGame(); location.reload(); } catch(e) { alert("Error"); } }

    function init() {
        loadGame();
        const grid = document.getElementById('garden-view');
        for(let i=0; i<25; i++) {
            const el = document.createElement('div'); el.className = 'plot'; el.id = `p-${i}`; el.onclick = () => handlePlot(i);
            grid.appendChild(el);
        }
        setInterval(updateGlobalLogic, 1000);
        renderShop();
    }
    init();
</script>
</body>
</html>
