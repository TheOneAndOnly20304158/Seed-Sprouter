<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seed Sprouter Pro - Golden Hour Edition</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            transition: background 2s;
        }
        body.raining { background: linear-gradient(to bottom, #4682B4, #708090); }
        body.golden { background: linear-gradient(to bottom, #FFD700, #FF8C00); }
        
        #game {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
        }
        .header { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .stat-card { background: #fff9c4; padding: 10px 20px; border-radius: 10px; border: 2px solid #fbc02d; font-size: 1.2em; }
        
        #weather-box { background: #e3f2fd; padding: 10px; border-radius: 10px; border: 2px solid #2196f3; margin-bottom: 15px; font-weight: bold; }
        .golden-alert { color: #d84315; font-size: 1.2em; font-weight: bold; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        .column { display: flex; flex-direction: column; gap: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; border: 2px solid #ccc; text-align: left; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 5px 0; border-bottom: 1px solid #eee; }
        
        .seed-btn { background: #fff; border: 2px solid #4CAF50; border-radius: 5px; cursor: pointer; padding: 6px 10px; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .seed-btn:hover:not(:disabled) { background: #e8f5e9; transform: translateY(-1px); }
        .seed-btn.active { background: #4CAF50; color: white; }
        .sell-btn { background: #ff9800; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #garden { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; background: #795548; padding: 20px; border-radius: 15px; align-self: start; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .plot { background: #8d6e63; aspect-ratio: 1/1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; border: 2px solid #6d4c41; transition: 0.1s; position: relative; overflow: hidden; }
        .plot.ready { background: #4caf50; animation: pulse 1.5s infinite; border-color: #2e7d32; }
        
        .timer-text { color: #d32f2f; font-weight: bold; font-size: 14px; margin-bottom: 10px; text-align: center; background: #ffebee; border-radius: 5px; padding: 5px; }
        textarea { width: 100%; font-size: 10px; height: 50px; margin-top: 5px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <h1>🌻 Seed Sprouter Pro 🌻</h1>
        <div class="stat-card"><strong>Munz: 💰<span id="munz">100</span></strong></div>
    </div>

    <div class="column">
        <div id="weather-box">
            <div id="golden-status"></div>
            Weather: <span id="weather-status">☀️ Sunny</span><br>
            <small id="weather-timer">Next change in: --:--</small>
        </div>
        
        <div class="box">
            <h3 style="margin:0">Global Shop</h3>
            <div class="timer-text">Restock in: <span id="restock-timer">--</span>s</div>
            <div id="shop-list"></div>
        </div>

        <div class="box" style="background: #e8f5e9;">
            <h3 style="margin:0 0 10px 0">🎒 Seed Bag</h3>
            <div id="inventory-list"></div>
            <hr><small>Holding: <strong id="selected-txt">None</strong></small>
        </div>
    </div>

    <div id="garden"></div>

    <div class="column">
        <div class="box" style="background: #fff3e0; border-color: #ff9800;">
            <h3 style="margin:0 0 10px 0">🧺 The Barn</h3>
            <div id="barn-list"></div>
            <button class="sell-btn" style="width:100%; margin-top:10px;" id="sell-all-btn" onclick="sellAll()">Sell All Crops</button>
        </div>

        <div class="box">
            <h3 style="margin:0 0 10px 0">Global Chat</h3>
            <iframe src="https://www3.cbox.ws/box/?boxid=3553708&boxtag=vUIUmT" width="100%" height="250" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>
        </div>

        <div class="box">
            <h3 style="margin:0 0 5px 0">Save Data</h3>
            <textarea id="saveCode" placeholder="Save code..."></textarea>
            <button class="seed-btn" style="width:100%; margin-top:5px;" onclick="exportSave()">Export</button>
            <button class="seed-btn" style="width:100%; margin-top:5px;" onclick="importSave()">Import</button>
        </div>
    </div>
</div>

<script>
    let state = {
        munz: 100, 
        selectedSeed: null,
        inventory: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        barn: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        plots: Array(25).fill(null),
        shopInventory: {}, 
        currentShopID: "", 
        isRaining: false,
        isGolden: false
    };

    const cropData = {
        Basil:     { symbol: "🌿", price: 10,  time: 15000,  sell: 15 },
        Wheat:     { symbol: "🌾", price: 75,  time: 30000,  sell: 100 },
        Carrot:    { symbol: "🥕", price: 50,  time: 45000,  sell: 75 },
        Tomato:    { symbol: "🍅", price: 100, time: 60000, sell: 125 },
        Sunflower: { symbol: "🌻", price: 200, time: 120000, sell: 500 }
    };

    function seededRandom(seed) {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    function updateGlobalEvents() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();

        // --- SHOP SYNC (1m) ---
        const shopID = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}-${minutes}`;
        if (state.currentShopID !== shopID) {
            state.currentShopID = shopID;
            state.shopInventory = {};
            let seed = 0; for(let i=0; i<shopID.length; i++) seed += shopID.charCodeAt(i);
            const gen = (id, c, min, max) => { seed++; if (seededRandom(seed) < c) state.shopInventory[id] = Math.floor(seededRandom(seed+1)*(max-min+1))+min; };
            gen("Basil", 1.0, 10, 25); gen("Wheat", 0.75, 8, 20); gen("Carrot", 0.80, 5, 15); gen("Tomato", 0.40, 4, 10); gen("Sunflower", 0.15, 1, 4);
            renderShop();
        }
        document.getElementById('restock-timer').textContent = 59 - seconds;

        // --- WEATHER SYNC (3m Rain / 7m Sun) ---
        state.isRaining = (minutes % 10 < 3);
        const statusEl = document.getElementById('weather-status');
        const timerEl = document.getElementById('weather-timer');
        if (state.isRaining) {
            document.body.classList.add('raining');
            statusEl.innerHTML = "<span style='color:#0d47a1;'>🌧️ RAINING (3x Speed!)</span>";
            timerEl.textContent = `Ends in: ${2 - (minutes % 10)}m ${59 - seconds}s`;
        } else {
            document.body.classList.remove('raining');
            statusEl.textContent = "☀️ Sunny";
            timerEl.textContent = `Rain in: ${9 - (minutes % 10)}m ${59 - seconds}s`;
        }

        // --- GOLDEN HOUR SYNC (Last 10m of every hour) ---
        state.isGolden = (minutes >= 50);
        const goldenBox = document.getElementById('golden-status');
        if (state.isGolden) {
            document.body.classList.add('golden');
            goldenBox.innerHTML = "<div class='golden-alert'>✨ GOLDEN HOUR (2x SELL PRICE!) ✨</div>";
            document.getElementById('sell-all-btn').style.background = "#d4af37";
            document.getElementById('sell-all-btn').textContent = "💰 SELL ALL (BONUS!)";
        } else {
            document.body.classList.remove('golden');
            goldenBox.innerHTML = "";
            document.getElementById('sell-all-btn').style.background = "#ff9800";
            document.getElementById('sell-all-btn').textContent = "Sell All Crops";
        }
    }

    function renderShop() {
        const sEl = document.getElementById('shop-list'); sEl.innerHTML = '';
        for (let k in state.shopInventory) {
            const stock = state.shopInventory[k];
            sEl.innerHTML += `<div class="item-row" style="${stock<=0?'opacity:0.5':''}">
                <div><strong>${cropData[k].symbol} ${k}</strong><br><small>Stock: ${stock<=0?'OUT':stock}</small></div>
                <button class="seed-btn" onclick="buySeed('${k}')" ${stock<=0?'disabled':''}>💰${cropData[k].price}</button>
            </div>`;
        }
    }

    function buySeed(t) {
        if (state.munz >= cropData[t].price && state.shopInventory[t] > 0) {
            state.munz -= cropData[t].price; state.inventory[t]++; state.shopInventory[t]--;
            renderShop(); refreshUI(); saveGame();
        }
    }

    function handlePlot(i) {
        const p = state.plots[i];
        if (p && p.progress >= 100) {
            const key = Object.keys(cropData).find(k => cropData[k].symbol === p.symbol);
            state.barn[key]++; state.plots[i] = null;
        } else if (!p && state.selectedSeed && state.inventory[state.selectedSeed] > 0) {
            state.inventory[state.selectedSeed]--;
            state.plots[i] = { ...cropData[state.selectedSeed], progress: 0 };
            if (state.inventory[state.selectedSeed] === 0) state.selectedSeed = null;
        }
        refreshUI(); saveGame();
    }

    function refreshUI() {
        document.getElementById('munz').textContent = Math.floor(state.munz);
        document.getElementById('selected-txt').textContent = state.selectedSeed || "None";
        
        const invEl = document.getElementById('inventory-list'); invEl.innerHTML = '';
        for (let k in state.inventory) if (state.inventory[k] > 0) {
            invEl.innerHTML += `<div class="item-row"><span>${cropData[k].symbol} x${state.inventory[k]}</span><button class="seed-btn ${state.selectedSeed===k?'active':''}" onclick="state.selectedSeed='${k}';refreshUI()">Hold</button></div>`;
        }

        const barnEl = document.getElementById('barn-list'); barnEl.innerHTML = '';
        for (let k in state.barn) if (state.barn[k] > 0) {
            const currentPrice = state.isGolden ? cropData[k].sell * 2 : cropData[k].sell;
            barnEl.innerHTML += `<div class="item-row"><span>${cropData[k].symbol} x${state.barn[k]}</span><button class="sell-btn" onclick="sellCrop('${k}')">💰${currentPrice}</button></div>`;
        }

        state.plots.forEach((p, i) => {
            const el = document.getElementById(`p-${i}`);
            if (!p) { el.textContent = ''; el.style.background = "#8d6e63"; } 
            else {
                if (p.progress >= 100) { el.textContent = p.symbol; el.className = 'plot ready'; el.style.background = "#4caf50"; }
                else { el.textContent = '🌱'; el.style.background = `linear-gradient(to top, #4CAF50 ${p.progress}%, #8d6e63 ${p.progress}%)`; }
            }
        });
    }

    function sellCrop(t) {
        if (state.barn[t] > 0) {
            const price = state.isGolden ? cropData[t].sell * 2 : cropData[t].sell;
            state.munz += price; state.barn[t]--; refreshUI(); saveGame();
        }
    }

    function sellAll() {
        for (let k in state.barn) {
            const price = state.isGolden ? cropData[k].sell * 2 : cropData[k].sell;
            state.munz += (state.barn[k] * price); state.barn[k] = 0;
        }
        refreshUI(); saveGame();
    }

    function saveGame() { localStorage.setItem('sprouterGoldenSave', JSON.stringify(state)); }
    function loadGame() {
        const saved = localStorage.getItem('sprouterGoldenSave');
        if (saved) state = Object.assign(state, JSON.parse(saved));
    }
    function exportSave() { document.getElementById('saveCode').value = btoa(JSON.stringify(state)); }
    function importSave() { try { state = JSON.parse(atob(document.getElementById('saveCode').value)); saveGame(); location.reload(); } catch(e) { alert("Err"); } }

    function init() {
        loadGame();
        const grid = document.getElementById('garden');
        for(let i=0; i<25; i++) {
            const el = document.createElement('div'); el.className = 'plot'; el.id = `p-${i}`; el.onclick = () => handlePlot(i);
            grid.appendChild(el);
        }
        setInterval(() => { 
            updateGlobalEvents();
            state.plots.forEach(p => { if(p && p.progress < 100) p.progress += ( (state.isRaining?3:1) / (p.time/1000) ) * 100; });
            refreshUI(); 
        }, 1000);
    }
    init();
</script>
</body>
</html>
