<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seed Sprouter Pro - 1m Global Sync</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            transition: background 2s;
        }
        body.raining { background: linear-gradient(to bottom, #4682B4, #708090); }
        
        #game {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            gap: 20px;
        }
        .header { grid-column: span 3; display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; border-bottom: 2px solid #eee; }
        .stat-card { background: #fff9c4; padding: 10px 20px; border-radius: 10px; border: 2px solid #fbc02d; font-size: 1.2em; }
        
        #weather-box { background: #e3f2fd; padding: 10px; border-radius: 10px; border: 2px solid #2196f3; margin-bottom: 15px; font-weight: bold; }
        .rain-alert { color: #0d47a1; animation: flash 1s infinite; }
        @keyframes flash { 50% { opacity: 0.5; } }

        .column { display: flex; flex-direction: column; gap: 15px; }
        .box { background: white; padding: 15px; border-radius: 12px; border: 2px solid #ccc; text-align: left; }
        .item-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 5px 0; border-bottom: 1px solid #eee; }
        
        .seed-btn { background: #fff; border: 2px solid #4CAF50; border-radius: 5px; cursor: pointer; padding: 6px 10px; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .seed-btn:hover:not(:disabled) { background: #e8f5e9; transform: translateY(-1px); }
        .seed-btn.active { background: #4CAF50; color: white; }
        .sell-btn { background: #ff9800; border: none; color: white; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }

        #garden { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; background: #795548; padding: 20px; border-radius: 15px; align-self: start; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .plot { background: #8d6e63; aspect-ratio: 1/1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 32px; cursor: pointer; border: 2px solid #6d4c41; transition: 0.1s; position: relative; overflow: hidden; }
        .plot.ready { background: #4caf50; animation: pulse 1.5s infinite; border-color: #2e7d32; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .timer-text { color: #d32f2f; font-weight: bold; font-size: 14px; margin-bottom: 10px; text-align: center; background: #ffebee; border-radius: 5px; padding: 5px; }
        textarea { width: 100%; font-size: 10px; height: 50px; margin-top: 5px; resize: none; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <h1>🌻 Seed Sprouter Pro 🌻</h1>
        <div class="stat-card"><strong>Munz: 💰<span id="munz">100</span></strong></div>
    </div>

    <div class="column">
        <div id="weather-box">
            Weather: <span id="weather-status">☀️ Sunny</span><br>
            <small id="weather-timer">Next change in: --:--</small>
        </div>
        
        <div class="box">
            <h3 style="margin:0">Global Shop</h3>
            <div class="timer-text">Restock in: <span id="restock-timer">--</span>s</div>
            <div id="shop-list"></div>
        </div>

        <div class="box" style="background: #e8f5e9;">
            <h3 style="margin:0 0 10px 0">🎒 Seed Bag</h3>
            <div id="inventory-list"></div>
            <hr><small>Holding: <strong id="selected-txt">None</strong></small>
        </div>
    </div>

    <div id="garden"></div>

    <div class="column">
        <div class="box" style="background: #fff3e0; border-color: #ff9800;">
            <h3 style="margin:0 0 10px 0">🧺 The Barn</h3>
            <div id="barn-list"></div>
            <button class="sell-btn" style="width:100%; margin-top:10px;" onclick="sellAll()">Sell All Crops</button>
        </div>

        <div class="box">
            <h3 style="margin:0 0 10px 0">Global Chat</h3>
            <iframe src="https://www3.cbox.ws/box/?boxid=3553708&boxtag=vUIUmT" width="100%" height="250" allowtransparency="yes" allow="autoplay" frameborder="0" marginheight="0" marginwidth="0" scrolling="auto"></iframe>
        </div>

        <div class="box">
            <h3 style="margin:0 0 5px 0">Save Data</h3>
            <textarea id="saveCode" placeholder="Save code..."></textarea>
            <button class="seed-btn" style="width:100%; margin-top:5px;" onclick="exportSave()">Export</button>
            <button class="seed-btn" style="width:100%; margin-top:5px;" onclick="importSave()">Import</button>
        </div>
    </div>
</div>

<script>
    let state = {
        munz: 100, 
        selectedSeed: null,
        inventory: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        barn: { Basil: 0, Wheat: 0, Carrot: 0, Tomato: 0, Sunflower: 0 },
        plots: Array(25).fill(null),
        shopInventory: {}, 
        currentShopID: "", 
        isRaining: false
    };

    const cropData = {
        Basil:     { symbol: "🌿", price: 10,  time: 15000,  sell: 15 },
        Wheat:     { symbol: "🌾", price: 75,  time: 30000,  sell: 100 },
        Carrot:    { symbol: "🥕", price: 50,  time: 45000,  sell: 75 },
        Tomato:    { symbol: "🍅", price: 100, time: 60000, sell: 125 },
        Sunflower: { symbol: "🌻", price: 200, time: 120000, sell: 500 }
    };

    function seededRandom(seed) {
        let x = Math.sin(seed++) * 10000;
        return x - Math.floor(x);
    }

    function updateGlobalShop() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        
        // --- 1 MINUTE RESTOCK LOGIC ---
        const shopID = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}-${minutes}`;

        if (state.currentShopID !== shopID) {
            state.currentShopID = shopID;
            state.shopInventory = {};
            let seed = 0;
            for(let i=0; i<shopID.length; i++) seed += shopID.charCodeAt(i);

            const generate = (id, chance, min, max) => {
                seed++;
                if (seededRandom(seed) < chance) {
                    state.shopInventory[id] = Math.floor(seededRandom(seed + 1) * (max - min + 1)) + min;
                }
            };

            generate("Basil", 1.0, 10, 25);
            generate("Wheat", 0.75, 8, 20);
            generate("Carrot", 0.80, 5, 15);
            generate("Tomato", 0.40, 4, 10);
            generate("Sunflower", 0.15, 1, 4);
            renderShop();
        }

        const remaining = 59 - seconds;
        document.getElementById('restock-timer').textContent = remaining;
    }

    function updateWeather() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const rainActive = (minutes % 10 < 3);
        state.isRaining = rainActive;

        const statusEl = document.getElementById('weather-status');
        const timerEl = document.getElementById('weather-timer');
        
        if (rainActive) {
            document.body.classList.add('raining');
            statusEl.innerHTML = "<span class='rain-alert'>🌧️ RAINING (3x Speed!)</span>";
            timerEl.textContent = `Ends in: ${2 - (minutes % 10)}m ${59 - seconds}s`;
        } else {
            document.body.classList.remove('raining');
            statusEl.textContent = "☀️ Sunny";
            timerEl.textContent = `Rain in: ${9 - (minutes % 10)}m ${59 - seconds}s`;
        }
    }

    function renderShop() {
        const shopEl = document.getElementById('shop-list');
        shopEl.innerHTML = '';
        for (let key in state.shopInventory) {
            const stock = state.shopInventory[key];
            const isOut = stock <= 0;
            shopEl.innerHTML += `<div class="item-row" style="${isOut ? 'opacity:0.5' : ''}">
                <div><strong>${cropData[key].symbol} ${key}</strong><br><small>Stock: ${isOut ? 'OUT' : stock}</small></div>
                <button class="seed-btn" onclick="buySeed('${key}')" ${isOut ? 'disabled' : ''}>💰${cropData[key].price}</button>
            </div>`;
        }
    }

    function buySeed(type) {
        if (state.munz >= cropData[type].price && state.shopInventory[type] > 0) {
            state.munz -= cropData[type].price;
            state.inventory[type]++;
            state.shopInventory[type]--;
            renderShop(); refreshUI(); saveGame();
        }
    }

    function handlePlot(i) {
        const p = state.plots[i];
        if (p && p.progress >= 100) {
            const key = Object.keys(cropData).find(k => cropData[k].symbol === p.symbol);
            state.barn[key]++;
            state.plots[i] = null;
        } else if (!p && state.selectedSeed && state.inventory[state.selectedSeed] > 0) {
            state.inventory[state.selectedSeed]--;
            state.plots[i] = { ...cropData[state.selectedSeed], progress: 0 };
            if (state.inventory[state.selectedSeed] === 0) state.selectedSeed = null;
        }
        refreshUI(); saveGame();
    }

    function growPlants() {
        const speed = state.isRaining ? 3 : 1;
        state.plots.forEach(p => {
            if (p && p.progress < 100) {
                p.progress += (speed / (p.time / 1000)) * 100;
                if (p.progress > 100) p.progress = 100;
            }
        });
    }

    function refreshUI() {
        document.getElementById('munz').textContent = Math.floor(state.munz);
        document.getElementById('selected-txt').textContent = state.selectedSeed || "None";
        
        const invEl = document.getElementById('inventory-list');
        invEl.innerHTML = '';
        for (let key in state.inventory) {
            if (state.inventory[key] > 0) {
                const active = state.selectedSeed === key ? 'active' : '';
                invEl.innerHTML += `<div class="item-row"><span>${cropData[key].symbol} x${state.inventory[key]}</span><button class="seed-btn ${active}" onclick="state.selectedSeed='${key}';refreshUI()">Hold</button></div>`;
            }
        }

        const barnEl = document.getElementById('barn-list');
        barnEl.innerHTML = '';
        for (let key in state.barn) {
            if (state.barn[key] > 0) {
                barnEl.innerHTML += `<div class="item-row"><span>${cropData[key].symbol} x${state.barn[key]}</span><button class="sell-btn" onclick="sellCrop('${key}')">Sell 1</button></div>`;
            }
        }

        state.plots.forEach((p, i) => {
            const el = document.getElementById(`p-${i}`);
            if (!p) { el.textContent = ''; el.className = 'plot'; el.style.background = "#8d6e63"; } 
            else {
                if (p.progress >= 100) { el.textContent = p.symbol; el.className = 'plot ready'; el.style.background = "#4caf50"; }
                else { 
                    el.textContent = '🌱'; 
                    el.className = 'plot';
                    el.style.background = `linear-gradient(to top, #4CAF50 ${p.progress}%, #8d6e63 ${p.progress}%)`;
                }
            }
        });
    }

    function sellCrop(type) { if (state.barn[type] > 0) { state.munz += cropData[type].sell; state.barn[type]--; refreshUI(); saveGame(); } }
    function sellAll() { for (let key in state.barn) { state.munz += (state.barn[key] * cropData[key].sell); state.barn[key] = 0; } refreshUI(); saveGame(); }
    function saveGame() { localStorage.setItem('sprouter1mSave', JSON.stringify(state)); }
    function loadGame() {
        const saved = localStorage.getItem('sprouter1mSave');
        if (saved) state = Object.assign(state, JSON.parse(saved));
    }
    function exportSave() { document.getElementById('saveCode').value = btoa(JSON.stringify(state)); alert("Exported!"); }
    function importSave() { try { state = JSON.parse(atob(document.getElementById('saveCode').value)); saveGame(); location.reload(); } catch(e) { alert("Invalid Code"); } }

    function init() {
        loadGame();
        const grid = document.getElementById('garden');
        for(let i=0; i<25; i++) {
            const el = document.createElement('div'); el.className = 'plot'; el.id = `p-${i}`; el.onclick = () => handlePlot(i);
            grid.appendChild(el);
        }
        setInterval(() => { 
            updateWeather(); 
            updateGlobalShop();
            growPlants(); 
            refreshUI(); 
        }, 1000);
    }
    init();
</script>
</body>
</html>
